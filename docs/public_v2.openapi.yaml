                        | PRODUCT_SECRETS |  |
                        | PRODUCT_AI_SAST |  |

                statuses:
                    example: ["SCAN_STATUS_RUNNING", "SCAN_STATUS_COMPLETED"]
                    enum:
                        - SCAN_STATUS_RUNNING
                        - SCAN_STATUS_COMPLETED
                        - SCAN_STATUS_PENDING
                        - SCAN_STATUS_CANCELLED
                        - SCAN_STATUS_ERROR
                        - SCAN_STATUS_NEVER_FINISHED
                    type: array
                    items:
                        enum:
                            - SCAN_STATUS_UNSPECIFIED
                            - SCAN_STATUS_RUNNING
                            - SCAN_STATUS_COMPLETED
                            - SCAN_STATUS_PENDING
                            - SCAN_STATUS_CANCELLED
                            - SCAN_STATUS_ERROR
                            - SCAN_STATUS_NEVER_FINISHED
                        type: string
                        format: enum
