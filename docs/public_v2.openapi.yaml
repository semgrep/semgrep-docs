                params:
                    allOf:
                        - $ref: '#/components/schemas/protos.issues.v1.UpdateFindingParams'
                    description: Params used to update the list of findings.
                issueTypes:
                    enum:
                        - ISSUE_TYPE_SAST
                        - ISSUE_TYPE_SCA
                        - ISSUE_TYPE_SECRETS
                        - ISSUE_TYPE_RESEARCH
                        - ISSUE_TYPE_AI_SAST
