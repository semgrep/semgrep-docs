                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/protos.ai.v1.CreateFixJobResponse'
            security:
                - SemgrepWebToken: []
                - SemgrepJWT: []
            x-badges: [{"name": "Experimental", "position": "after", "color": "red"}]
