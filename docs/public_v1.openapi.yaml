      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/protos.openapi.v1.CreateSbomExportRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/protos.openapi.v1.CreateSbomExportResponse'
          description: OK
      security:
      - SemgrepWebToken: []
      summary: Create a new SBOM export job
