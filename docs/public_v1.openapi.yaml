        name: deploymentId
        required: true
        schema:
          description: 'Deployment ID (numeric). Example: `123`. Can be found at `/deployments`,
            or in your Settings in the web UI.'
          example: 123
          format: int64
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/protos.openapi.v1.ListPoliciesResponse'
          description: OK
      security:
      - SemgrepWebToken: []
      summary: List policies
      tags:
      - PoliciesService
      x-badges: []
  /api/v1/deployments/{deploymentId}/policies/{policyId}:
    get:
      operationId: PoliciesService_ListPolicyRules
      parameters:
      - in: path
        name: deploymentId
        required: true
        schema:
          description: 'Deployment ID (numeric). Example: `123`. Can be found at `/deployments`,
            or in your Settings in the web UI.'
          example: 123
          format: int64
          type: string
      - in: path
        name: policyId
        required: true
        schema:
          description: 'Policy ID (numeric). Example: `456`. Can be found at `/deployments/{deploymentId}/policies`.'
          example: 456
          format: int64
          type: string
      - in: query
        name: cursor
        schema:
          description: Cursor to paginate through the rules. Provide a cursor value
            from the response to retrieve the next page.
          type: string
      - in: query
        name: limit
        schema:
          description: Page size to paginate through the rules. The default page size
            is `500` and the maximum allowed page size is `2000`.
          format: int64
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/protos.openapi.v1.ListPolicyRulesResponse'
          description: OK
      security:
      - SemgrepWebToken: []
      summary: List policy rules
      tags:
      - PoliciesService
      x-badges: []
    put:
      operationId: PoliciesService_UpdatePolicy
      parameters:
      - in: path
        name: deploymentId
        required: true
        schema:
          description: 'Deployment ID (numeric). Example: `123`. Can be found at `/deployments`,
            or in your Settings in the web UI.'
          example: 123
          format: int64
          type: string
      - in: path
        name: policyId
        required: true
        schema:
          description: 'Policy ID (numeric). Example: `456`. Can be found at `/deployments/{deploymentId}/policies`.'
          example: 456
          format: int64
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/protos.openapi.v1.UpdatePolicyRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/protos.openapi.v1.UpdatePolicyResponse'
          description: OK
      security:
      - SemgrepWebToken: []
      summary: Update policy
      tags:
      - PoliciesService
      x-badges: []
  /api/v1/deployments/{deploymentId}/sbom/export:
    post:
      operationId: SupplyChainService_CreateSbomExport
      parameters:
      - in: path
        name: deploymentId
        required: true
        schema:
          description: 'Deployment ID (numeric). Example: `123`. Can be found at `/deployments`,
            or in your Settings in the web UI.'
          example: 123
          format: int64
