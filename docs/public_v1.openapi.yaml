            generate the final "status" viewable in the UI'
          enum:
          - untriaged
          - ignored
          - reopened
          - reviewing
          - fixing
          - provisionally_ignored
          example: untriaged
          type: string
        triaged_at:
          description: When the finding was triaged
          example: 2020-11-19 23:28:12.391807+00:00
