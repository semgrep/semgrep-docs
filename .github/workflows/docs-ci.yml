name: Docs CI

on:
  pull_request:
    paths:
      - "docs/**"
      - "run-build-scripts"
      - "replace-on-build.py"
      - "copy-metrics-md"
  push:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "run-build-scripts"
      - "replace-on-build.py"
      - "copy-metrics-md"
  workflow_dispatch: {}

jobs:
  regenerate:
    name: Regenerate docs from templates
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Run build scripts
        run: bash run-build-scripts

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate docs from build scripts"
          commit_user_name: ${{ steps.import-gpg.outputs.name }}
          commit_user_email: ${{ steps.import-gpg.outputs.email }}
          commit_author: "${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>"
          file_pattern: |
            docs/extensions/pre-commit.mdx
            docs/snippets/metrics.mdx

  validate:
    name: Validate docs
    needs: regenerate
    if: always() && (needs.regenerate.result == 'success' || needs.regenerate.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate dynamic content
        run: bash run-build-scripts

      - name: Verify generated files are committed
        run: |
          git diff --exit-code -- \
            docs/extensions/pre-commit.mdx \
            docs/snippets/metrics.mdx || {
            echo "::error::Generated files are out of date. On pull requests from this repo, the regenerate job should commit them automatically; otherwise run 'bash run-build-scripts' locally."
            exit 1
          }

      - name: Check links and redirects
        working-directory: docs
        # Pinned: mintlify@latest 4.2.697+ regressed and fails to parse
        # cheat-sheets/django-xss.mdx ("URIError: URI malformed" on the Django
        # {% %} template syntax), breaking this check on every PR. 4.2.696 is
        # the last version that parses it. Re-evaluate/bump when upstream fixes it.
        run: npx --yes mintlify@4.2.696 broken-links --check-redirects
